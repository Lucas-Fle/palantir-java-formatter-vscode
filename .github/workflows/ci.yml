name: CI

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build, test and package
        if: runner.os != 'Linux'
        run: npm run package

      - name: Build, test and package (Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run package

      - name: Verify packaged worker
        shell: bash
        run: |
          jar tf artifacts/*.vsix \
            | grep 'extension/dist/worker/palantir-java-format-worker.jar'

      - uses: actions/upload-artifact@v4
        with:
          name: palantir-java-format-vscode-${{ runner.os }}
          path: artifacts/*.vsix
